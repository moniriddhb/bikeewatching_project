<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bikewatching</title>

    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="global.css" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  </head>

  <body>
    <header>
      <h1>🚴🏼‍♀️ Bikewatching</h1>

      <label>
        Filter by time:
        <input id="time-slider" type="range" min="-1" max="1440" value="-1" />
        <time id="selected-time"></time>
        <em id="any-time">(any time)</em>
      </label>
    </header>

    <p>
      An interactive map visualization of BlueBike traffic in the Boston area.
    </p>

    <div id="map"></div>

    <div class="legend">
      <div style="--departure-ratio: 1;">More departures</div>
      <div style="--departure-ratio: 0.5;">Balanced</div>
      <div style="--departure-ratio: 0;">More arrivals</div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
